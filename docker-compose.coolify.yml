services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: paperclip
      POSTGRES_DB: paperclip
    volumes:
      - kukuma-pg:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip"]
      interval: 5s
      timeout: 5s
      retries: 10

  kukuma-ai:
    build:
      context: .
      dockerfile: Dockerfile.coolify
    ports:
      - "3100:3100"
    environment:
      HOST: "0.0.0.0"
      DATABASE_URL: "postgresql://paperclip:paperclip@postgres:5432/paperclip"
      PAPERCLIP_HOME: "/data"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "public"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      PAPERCLIP_FORCE_RESET_SCHEMA: "true"
    volumes:
      - kukuma-data:/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  kukuma-pg:
  kukuma-data:
